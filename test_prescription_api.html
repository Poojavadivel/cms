<!DOCTYPE html>
<html>
<head>
    <title>Test Prescription API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            background: #207DC0;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #165a8a;
        }
        .result {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 12px;
        }
        .error {
            background: #fee;
            color: #c00;
        }
        .success {
            background: #efe;
            color: #060;
        }
        input {
            padding: 8px;
            width: 400px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>🔬 Test Prescription API</h1>
    
    <div class="test-section">
        <h2>Test 1: Get Auth Token</h2>
        <p>Current token: <code id="currentToken">Not set</code></p>
        <button onclick="checkToken()">Check Token</button>
    </div>

    <div class="test-section">
        <h2>Test 2: Fetch Prescriptions</h2>
        <p>Patient ID: <input type="text" id="patientId" value="16686d13-3bc9-4609-9dc5-6c9c533339c7" /></p>
        <button onclick="fetchPrescriptions()">Fetch Prescriptions</button>
        <div id="prescriptionResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>Test 3: Check All Prescriptions in DB</h2>
        <button onclick="checkAllPrescriptions()">Get All Prescriptions</button>
        <div id="allPrescriptionsResult" class="result"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        
        function getToken() {
            return localStorage.getItem('auth_token') || localStorage.getItem('x-auth-token');
        }

        function checkToken() {
            const token = getToken();
            document.getElementById('currentToken').textContent = token ? token.substring(0, 50) + '...' : 'Not found';
            if (!token) {
                alert('No auth token found! Please login first.');
            } else {
                alert('Token found! You are authenticated.');
            }
        }

        async function fetchPrescriptions() {
            const patientId = document.getElementById('patientId').value;
            const resultDiv = document.getElementById('prescriptionResult');
            resultDiv.className = 'result';
            resultDiv.textContent = 'Loading...';

            try {
                const token = getToken();
                if (!token) {
                    throw new Error('No auth token found. Please login first.');
                }

                console.log('Fetching prescriptions for patient:', patientId);
                
                const response = await fetch(`${API_BASE}/scanner-enterprise/prescriptions/${patientId}`, {
                    headers: {
                        'x-auth-token': token
                    }
                });

                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);

                resultDiv.className = data.success ? 'result success' : 'result error';
                resultDiv.textContent = JSON.stringify(data, null, 2);

                if (data.success && data.prescriptions && data.prescriptions.length > 0) {
                    console.log('✅ Found prescriptions:', data.prescriptions.length);
                    console.log('Sample prescription:', data.prescriptions[0]);
                } else {
                    console.log('⚠️ No prescriptions found for this patient');
                }

            } catch (error) {
                console.error('Error:', error);
                resultDiv.className = 'result error';
                resultDiv.textContent = 'ERROR: ' + error.message;
            }
        }

        async function checkAllPrescriptions() {
            const resultDiv = document.getElementById('allPrescriptionsResult');
            resultDiv.className = 'result';
            resultDiv.textContent = 'Loading...';

            try {
                const token = getToken();
                if (!token) {
                    throw new Error('No auth token found. Please login first.');
                }

                // Try to get prescriptions for any patient
                const response = await fetch(`${API_BASE}/scanner-enterprise/prescriptions/test-all`, {
                    headers: {
                        'x-auth-token': token
                    }
                });

                const data = await response.json();

                resultDiv.className = data.success ? 'result success' : 'result error';
                resultDiv.textContent = JSON.stringify(data, null, 2);

            } catch (error) {
                console.error('Error:', error);
                resultDiv.className = 'result error';
                resultDiv.textContent = 'ERROR: ' + error.message;
            }
        }

        // Auto-check token on load
        window.onload = function() {
            checkToken();
        };
    </script>
</body>
</html>
